                  - button "Copy code to clipboard" [ref=e380] [cursor=pointer]
                - paragraph [ref=e384]: The installer puts the app under your Windows user profile, creates Start menu shortcuts, can add a desktop shortcut, and can register startup at login. It does not need administrator permission.
