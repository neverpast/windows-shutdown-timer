              - article [ref=e343]:
                - generic [ref=e344]:
                  - heading "Windows Shutdown Timer" [level=1] [ref=e345]
                  - 'link "Permalink: Windows Shutdown Timer" [ref=e346] [cursor=pointer]':
                    - /url: "#windows-shutdown-timer"
                - paragraph [ref=e349]: A small Windows 11 tray app for daily shutdown reminders.
                - paragraph [ref=e350]: "Defaults:"
                - list [ref=e351]:
                  - listitem [ref=e352]: "23:45: voice + Windows notification, \"还有15分钟自动关机\""
                  - listitem [ref=e353]: "23:55: voice + Windows notification, \"还有5分钟自动关机\""
                  - listitem [ref=e354]: "23:59: voice + Windows notification, \"还有1分钟自动关机\""
                  - listitem [ref=e355]:
                    - text: "00:00: voice countdown from 10 to 1, then normal shutdown with"
                    - code [ref=e356]: shutdown.exe /s /t 0
                  - listitem [ref=e357]: The settings window shows the remaining time until the next scheduled shutdown.
                  - listitem [ref=e358]: The settings window can be resized manually.
                  - listitem [ref=e359]: Shutdown time is edited with the time picker.
                  - listitem [ref=e360]: Reminders are edited as "N minutes before shutdown"; the exact reminder time and message are shown automatically.
                  - listitem [ref=e361]: The settings window has a history tab that shows startup and shutdown records from the Windows System event log.
                  - listitem [ref=e362]: Shutdowns triggered by this app are marked as automatic in the history tab.
                  - listitem [ref=e363]: The settings window can be minimized to the tray and reopened from the tray menu or tray icon.
                  - listitem [ref=e364]: Only one tray app instance can run at a time.
                  - listitem [ref=e365]:
                    - text: If a settings file is corrupted, it is backed up as
                    - code [ref=e366]: "*.bad.json"
                    - text: and defaults are restored automatically.
                  - listitem [ref=e367]:
                    - text: "\"Pause tonight shutdown\" is persisted in"
                    - code [ref=e368]: "%AppData%\\WindowsShutdownTimer\\state.json"
                    - text: .
                - paragraph [ref=e369]: The app does not force-close applications by default. Unsaved documents can block shutdown.
                - generic [ref=e370]:
